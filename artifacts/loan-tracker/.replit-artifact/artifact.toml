kind = "mobile"
previewPath = "/mobile/"
title = "Loan Tracker (Mobile)"
version = "1.0.0"
id = "artifacts/loan-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20782

[services.development]
run = "pnpm --filter @workspace/loan-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loan-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/loan-tracker", "run", "serve" ]

[services.env]
PORT = "20782"
BASE_PATH = "/mobile/"
